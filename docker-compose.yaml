services:
  postgres:
    image: postgres:15-alpine
    container_name: tglobe-postgres
    environment:
      POSTGRES_DB: tglobe_db
      POSTGRES_USER: tglobe_user
      POSTGRES_PASSWORD: tglobe_secure_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - tglobe-network

  app:
    image: tglobe-app:v12
    container_name: tglobe-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tglobe_db
      SPRING_DATASOURCE_USERNAME: tglobe_user
      SPRING_DATASOURCE_PASSWORD: tglobe_secure_password_123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - tglobe-network

volumes:
  postgres-data:

networks:
  tglobe-network:
    driver: bridge