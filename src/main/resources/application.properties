# ========== DATABASE CONFIGURATION ==========
# For Docker/Kubernetes (postgres-service)
spring.datasource.url=jdbc:postgresql://postgres-service:5432/tglobe_db
# For local development (comment out above and use below)
# spring.datasource.url=jdbc:postgresql://localhost:5432/tglobe_db

spring.datasource.username=tglobe_user
spring.datasource.password=tglobe_secure_password_123
spring.datasource.driver-class-name=org.postgresql.Driver

# ========== JPA/HIBERNATE CONFIGURATION ==========
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========== SERVER CONFIGURATION ==========
server.port=8080
spring.application.name=tglobe-loadlinks

# ========== LOGGING ==========
logging.level.root=INFO
logging.level.com.tglobe.loadlinks=DEBUG

# ========== MAIL CONFIGURATION (FOR PASSWORD RESET) ==========
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ========== APPLICATION URL (FOR RESET LINKS) ==========
app.base-url=http://localhost:8080