# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://postgres-service:5432/tglobe_db
spring.datasource.username=tglobe_user
spring.datasource.password=tglobe_secure_password_123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080
spring.application.name=tglobe-loadlinks

# Logging
logging.level.root=INFO
logging.level.com.tglobe.loadlinks=DEBUG
